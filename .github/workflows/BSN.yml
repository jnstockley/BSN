name: Python application

on:
  #push:
  #  branches: [ main ]
  #pull_request:
  #  branches: [ main ]
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
      - name: Install Latest Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"
      - name: Install poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "${{ env.HOME }}/.local/bin" >> $GITHUB_PATH
      - name: Install dependencies
        shell: bash
        run: poetry install --with dev
      - name: Flake8 Linting
        run: |
          poetry run flake8 better_social_notifications --count --show-source --statistics
          poetry run flake8 better_social_notifications --count --max-complexity=10 --max-line-length=79 --statistics
      - name: PyLint Linting
        run: poetry run pylint better_social_notifications



